name: Kore E-com - Operação Dismatal

on:
  workflow_dispatch: # Permite rodar manualmente
  schedule:
    - cron: '0 10,16 * * *' # Roda às 10h e 16h

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependências
        run: |
          npm install puppeteer puppeteer-real-browser @supabase/supabase-js
          sudo apt-get update
          sudo apt-get install -y xvfb
          npx playwright install-deps chromium

      - name: Executar Coleta
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISMATAL_USER: ${{ secrets.DISMATAL_USER }}
          DISMATAL_PASS: ${{ secrets.DISMATAL_PASS }}
          USER_AGENT_REAL: ${{ secrets.USER_AGENT_REAL }}
        run: xvfb-run --auto-servernum node scraper.js

      - name: Salvar Prints (Mesmo em Erro)
        if: always() # 🚩 IMPORTANTE: Salva mesmo se falhar
        uses: actions/upload-artifact@v4
        with:
          name: debug-dismatal
          path: "*.png"
          retention-days: 1
